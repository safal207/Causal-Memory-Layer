version: "3.9"

services:
  cml-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      CML_STORE_PATH: /data/cml.db
      CML_RATE_LIMIT_ENABLED: "true"
      # CML_API_TOKEN: optional — uncomment to enable Bearer auth
      # CML_CORS_ORIGINS: "*"
    volumes:
      - cml-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  cml-data:
    driver: local
