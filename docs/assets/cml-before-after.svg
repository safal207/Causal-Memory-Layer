<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CML before-after causal audit visual</title>
  <desc id="desc">Ordinary logs show that an action happened. CML checks whether the action had valid causal lineage.</desc>
  <rect width="1200" height="630" rx="34" fill="#0F172A"/>
  <circle cx="1040" cy="90" r="170" fill="#1E293B" opacity="0.75"/>
  <circle cx="90" cy="540" r="160" fill="#334155" opacity="0.45"/>

  <text x="64" y="78" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">Causal Memory Layer</text>
  <text x="64" y="121" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Logs show what happened. CML checks why it was allowed.</text>

  <rect x="64" y="170" width="500" height="330" rx="26" fill="#F8FAFC"/>
  <text x="94" y="220" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Ordinary log</text>
  <text x="94" y="258" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Operational result looks successful</text>

  <rect x="94" y="295" width="410" height="52" rx="14" fill="#E2E8F0"/>
  <text x="116" y="329" fill="#0F172A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">write /data/funds.db</text>

  <rect x="94" y="365" width="410" height="52" rx="14" fill="#DCFCE7"/>
  <text x="116" y="399" fill="#166534" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">status: OK</text>

  <text x="94" y="455" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">✅ The action happened.</text>

  <rect x="636" y="170" width="500" height="330" rx="26" fill="#F8FAFC"/>
  <text x="666" y="220" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">CML audit</text>
  <text x="666" y="258" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Causal lineage is checked</text>

  <rect x="666" y="295" width="410" height="52" rx="14" fill="#E2E8F0"/>
  <text x="688" y="329" fill="#0F172A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">parent_cause: approval-42</text>

  <rect x="666" y="365" width="410" height="52" rx="14" fill="#FEE2E2"/>
  <text x="688" y="399" fill="#991B1B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">CML-AUDIT-R1-MISSING_PARENT</text>

  <text x="666" y="455" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">❌ The approval lineage is missing.</text>

  <path d="M585 335H616" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <path d="M610 322L625 335L610 348" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="64" y="535" width="1072" height="54" rx="18" fill="#1E293B"/>
  <text x="92" y="570" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">A system may be functionally correct while being causally invalid.</text>
</svg>
