name: Apply Strict Reviewer Core

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ci/coderabbit-qodo-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ci/coderabbit-qodo-fallback
          fetch-depth: 1
          persist-credentials: true

      - name: Apply assert-checked strict core patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/trust-root/scripts/reviewer_fallback.py')
          text = path.read_text(encoding='utf-8')
          if 'Qodo result must contain exactly one structured reviewed-commit field' in text:
              print('strict core already applied')
              raise SystemExit(0)

          replacements = [
              (
                  '''def _extract_reviewed_sha(body: str) -> str:
              candidates: set[str] = set()
              for raw_line in body.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith(">"):
                      continue
                  for pattern in REVIEWED_SHA_PATTERNS:
                      match = pattern.fullmatch(line)
                      if match:
                          candidates.add(_normalize_sha(match.group(1)))
              if not candidates:
                  raise FallbackError("Qodo result lacks a structured reviewed-commit field")
              if len(candidates) != 1:
                  raise FallbackError("Qodo result contains ambiguous reviewed-commit fields")
              return next(iter(candidates))
          ''',
                  '''def _extract_reviewed_sha(body: str) -> str:
              matches: list[str] = []
              for raw_line in body.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith(">"):
                      continue
                  for pattern in REVIEWED_SHA_PATTERNS:
                      match = pattern.fullmatch(line)
                      if match:
                          matches.append(_normalize_sha(match.group(1)))
              if not matches:
                  raise FallbackError("Qodo result lacks a structured reviewed-commit field")
              if len(matches) != 1:
                  raise FallbackError(
                      "Qodo result must contain exactly one structured reviewed-commit field"
                  )
              return matches[0]
          ''',
              ),
              (
                  '''            artifacts.extend(page_items)
                      if len(page_items) < 100:
                          break
                  matches = [
          ''',
                  '''            artifacts.extend(page_items)
                      if len(page_items) < 100:
                          break
                  else:
                      raise FallbackError(
                          "workflow artifact pagination exceeded the safe bound"
                      )
                  matches = [
          ''',
              ),
              (
                  '''    if head_sha is None:
                  return
              outcome = evidence["outcome"]
              if evidence.get("passed") is True:
                  state = "success"
                  description = f"Fallback evidence recorded: {outcome}"
              elif outcome == "PROVIDER_EVIDENCE_UNAVAILABLE":
                  state = "error"
                  description = "Qodo fallback evidence unavailable; never approval"
              else:
                  state = "failure"
                  description = f"Reviewer fallback rejected: {outcome}"
          ''',
                  '''    if head_sha is None or evidence.get("passed") is True:
                  return
              outcome = evidence["outcome"]
              if outcome == "PROVIDER_EVIDENCE_UNAVAILABLE":
                  state = "error"
                  description = "Qodo fallback evidence unavailable; never approval"
              else:
                  state = "failure"
                  description = f"Reviewer fallback rejected: {outcome}"
          ''',
              ),
              (
                  '''    if not isinstance(event, dict):
                  raise FallbackError("event payload must be an object")
              event_repository = event.get("repository")
          ''',
                  '''    if not isinstance(event, dict):
                  raise FallbackError("event payload must be an object")
              action = event.get("action")
              if action not in {"created", "edited"}:
                  raise FallbackError("issue_comment action must be created or edited")
              event_repository = event.get("repository")
          ''',
              ),
              (
                  '''    body = _printable_comment_body(comment.get("body"))
              if _matches_identity(
                  comment.get("user"), login=QODO_LOGIN, user_id=QODO_ID
              ) or _matches_identity(event.get("sender"), login=QODO_LOGIN, user_id=QODO_ID):
                  return _handle_qodo(
          ''',
                  '''    body = _printable_comment_body(comment.get("body"))
              is_qodo = _matches_identity(
                  comment.get("user"), login=QODO_LOGIN, user_id=QODO_ID
              ) or _matches_identity(
                  event.get("sender"), login=QODO_LOGIN, user_id=QODO_ID
              )
              if is_qodo and action != "created":
                  evidence.update(
                      {
                          "outcome": "REJECTED_EDITED_QODO_RESULT",
                          "passed": False,
                          "merge_authority": False,
                      }
                  )
                  return evidence
              if is_qodo:
                  return _handle_qodo(
          ''',
              ),
          ]

          for index, (old, new) in enumerate(replacements, start=1):
              if text.count(old) != 1:
                  raise SystemExit(f'replacement {index} expected exactly once')
              text = text.replace(old, new, 1)

          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit strict core
        run: |
          if git diff --quiet -- .github/trust-root/scripts/reviewer_fallback.py; then
            echo 'No core changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/trust-root/scripts/reviewer_fallback.py
          git commit -m 'fix: make reviewer fallback core intrinsically strict'
          git push origin HEAD:ci/coderabbit-qodo-fallback
