name: Python Package Validation

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - README.md
      - LICENSE
      - cml/**
      - cli/**
      - api/**
      - tests/**
      - benchmarks/**
      - scripts/run_safety_eval.py
      - docs/release/PYPI_RELEASE_CHECKLIST.md
      - .github/workflows/python-package-validation.yml
  pull_request:
    branches: [main]
    paths:
      - pyproject.toml
      - README.md
      - LICENSE
      - cml/**
      - cli/**
      - api/**
      - tests/**
      - benchmarks/**
      - scripts/run_safety_eval.py
      - docs/release/PYPI_RELEASE_CHECKLIST.md
      - .github/workflows/python-package-validation.yml
  workflow_dispatch:

jobs:
  package-validation:
    name: Build, check, install, and smoke-test package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Install package with dev extras
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run deterministic safety benchmark
        run: python scripts/run_safety_eval.py

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Install built wheel in fresh environment
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          cml --help
          python - <<'PY'
          import cml
          from cml.integrations.mcp import core
          print("cml import ok")
          print(core.health())
          PY

          set +e
          cml-mcp > /tmp/cml-mcp.out 2>&1
          status=$?
          set -e
          cat /tmp/cml-mcp.out
          test "$status" -eq 2
          grep -q "requires the optional MCP dependency" /tmp/cml-mcp.out
          grep -q 'pip install "causal-memory-layer\[mcp\]"' /tmp/cml-mcp.out
