name: CML Reviewer Fallback

on:
  issue_comment:
    types: [created, edited]

permissions: {}

concurrency:
  group: cml-reviewer-fallback-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    name: Route trusted reviewer fallback
    if: >-
      github.event.issue.pull_request != null &&
      (
        github.event.comment.user.login == 'coderabbitai[bot]' ||
        github.event.comment.user.login == 'qodo-code-review[bot]' ||
        contains(github.event.comment.body, 'Review limit reached') ||
        contains(github.event.comment.body, 'review rate limit') ||
        contains(github.event.comment.body, 'couldn''t start this review')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      issues: write
      statuses: write

    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Route CodeRabbit rate-limit fallback
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          python .github/trust-root/scripts/reviewer_fallback.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --run-url "$RUN_URL" \
            --output reviewer-fallback-evidence.json

      - name: Upload exact-attempt fallback evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cml-reviewer-fallback-pr${{ github.event.issue.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: reviewer-fallback-evidence.json
          if-no-files-found: error
          retention-days: 30
