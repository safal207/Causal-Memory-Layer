name: Apply Marker Scan Resilience

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ci/coderabbit-qodo-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ci/coderabbit-qodo-fallback
          fetch-depth: 1
          persist-credentials: true

      - name: Apply assert-checked marker scan patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/trust-root/scripts/reviewer_fallback.py')
          text = path.read_text(encoding='utf-8')
          if 'try:\n            marker = _parse_request_marker' in text:
              print('marker scan resilience already applied')
              raise SystemExit(0)

          old_parse = (
              '    for comment in candidates:\n'
              '        marker = _parse_request_marker(comment.get("body"))\n'
          )
          new_parse = (
              '    for comment in candidates:\n'
              '        try:\n'
              '            marker = _parse_request_marker(comment.get("body"))\n'
              '        except FallbackError:\n'
              '            continue\n'
          )
          if text.count(old_parse) != 1:
              raise SystemExit('marker parse replacement expected exactly once')
          text = text.replace(old_parse, new_parse, 1)

          old_validate = '''            artifact = _validate_request_comment(
                  client,
                  comment,
                  repository=repository,
                  pull_number=pull_number,
                  head_sha=head_sha,
              )
              matches.append((comment, artifact))
          '''
          new_validate = '''            try:
                  artifact = _validate_request_comment(
                      client,
                      comment,
                      repository=repository,
                      pull_number=pull_number,
                      head_sha=head_sha,
                  )
              except FallbackError:
                  continue
              matches.append((comment, artifact))
          '''
          if text.count(old_validate) != 1:
              raise SystemExit('marker validation replacement expected exactly once')
          text = text.replace(old_validate, new_validate, 1)

          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit resilient marker scan
        run: |
          if git diff --quiet -- .github/trust-root/scripts/reviewer_fallback.py; then
            echo 'No core changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/trust-root/scripts/reviewer_fallback.py
          git commit -m 'fix: skip malformed fallback history comments'
          git push origin HEAD:ci/coderabbit-qodo-fallback
