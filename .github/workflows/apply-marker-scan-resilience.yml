name: Apply Marker Scan Resilience

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ci/coderabbit-qodo-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ci/coderabbit-qodo-fallback
          fetch-depth: 1
          persist-credentials: true

      - name: Apply structurally bounded marker scan patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/trust-root/scripts/reviewer_fallback.py')
          lines = path.read_text(encoding='utf-8').splitlines(keepends=True)
          start_marker = '    for comment in candidates:\n'
          end_marker = '    if len(matches) > 1:\n'
          if any('try:' in line for line in lines[lines.index(start_marker):lines.index(end_marker)]):
              print('marker scan resilience already applied')
              raise SystemExit(0)
          start = lines.index(start_marker)
          end = lines.index(end_marker, start)
          replacement = '''    for comment in candidates:
              try:
                  marker = _parse_request_marker(comment.get("body"))
                  artifact = _validate_request_comment(
                      client,
                      comment,
                      repository=repository,
                      pull_number=pull_number,
                      head_sha=head_sha,
                  )
              except FallbackError:
                  continue
              if (
                  marker["repository"] == repository
                  and marker["pull_number"] == pull_number
                  and marker["head_sha"] == head_sha
              ):
                  matches.append((comment, artifact))
          '''.splitlines(keepends=True)
          lines[start:end] = replacement
          text = ''.join(lines)
          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit resilient marker scan
        run: |
          if git diff --quiet -- .github/trust-root/scripts/reviewer_fallback.py; then
            echo 'No core changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/trust-root/scripts/reviewer_fallback.py
          git commit -m 'fix: skip malformed fallback history comments'
          git push origin HEAD:ci/coderabbit-qodo-fallback
