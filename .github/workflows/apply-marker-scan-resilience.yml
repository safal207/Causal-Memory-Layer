name: Apply Marker Scan Resilience

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ci/coderabbit-qodo-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ci/coderabbit-qodo-fallback
          fetch-depth: 1
          persist-credentials: true

      - name: Apply regex-bounded marker scan patch
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path('.github/trust-root/scripts/reviewer_fallback.py')
          text = path.read_text(encoding='utf-8')
          if 'try:\n            marker = _parse_request_marker' in text:
              print('marker scan resilience already applied')
              raise SystemExit(0)

          pattern = re.compile(
              r'^    for comment in candidates:\n.*?'
              r'(?=^    if len\(matches\) > 1:\n)',
              flags=re.MULTILINE | re.DOTALL,
          )
          replacement = (
              '    for comment in candidates:\n'
              '        try:\n'
              '            marker = _parse_request_marker(comment.get("body"))\n'
              '            artifact = _validate_request_comment(\n'
              '                client,\n'
              '                comment,\n'
              '                repository=repository,\n'
              '                pull_number=pull_number,\n'
              '                head_sha=head_sha,\n'
              '            )\n'
              '        except FallbackError:\n'
              '            continue\n'
              '        if (\n'
              '            marker["repository"] == repository\n'
              '            and marker["pull_number"] == pull_number\n'
              '            and marker["head_sha"] == head_sha\n'
              '        ):\n'
              '            matches.append((comment, artifact))\n'
          )
          matches = pattern.findall(text)
          if len(matches) != 1:
              raise SystemExit(f'marker scan replacement expected once, got {len(matches)}')
          text = pattern.sub(replacement, text, count=1)
          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit resilient marker scan
        run: |
          if git diff --quiet -- .github/trust-root/scripts/reviewer_fallback.py; then
            echo 'No core changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/trust-root/scripts/reviewer_fallback.py
          git commit -m 'fix: skip malformed fallback history comments'
          git push origin HEAD:ci/coderabbit-qodo-fallback
