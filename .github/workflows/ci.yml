name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest \
            --cov=cml --cov=cli --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=45

      - name: Run Causal Equilibrium conformance benchmark
        run: |
          python benchmarks/equilibrium/run.py \
            --fixtures benchmarks/equilibrium/v1/fixtures.json \
            --json-out artifacts/equilibrium/report.json \
            --markdown-out artifacts/equilibrium/report.md \
            --implementation-commit "$GITHUB_SHA"

      - name: Upload equilibrium benchmark reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: equilibrium-benchmark-report
          path: artifacts/equilibrium/
          if-no-files-found: ignore

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
