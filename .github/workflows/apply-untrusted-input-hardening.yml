name: Apply Untrusted Input Hardening

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ci/coderabbit-qodo-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ci/coderabbit-qodo-fallback
          fetch-depth: 1
          persist-credentials: true

      - name: Apply assert-checked input hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/trust-root/scripts/reviewer_fallback.py')
          text = path.read_text(encoding='utf-8')
          if 'is_coderabbit = _matches_identity(' in text:
              print('untrusted-input hardening already applied')
              raise SystemExit(0)

          old_candidate = '        if REQUEST_MARKER_PREFIX in str(comment.get("body", ""))\n'
          new_candidate = (
              '        if _trusted_actions_comment(comment)\n'
              '        and REQUEST_MARKER_PREFIX in str(comment.get("body", ""))\n'
          )
          if text.count(old_candidate) != 1:
              raise SystemExit('trusted candidate replacement expected exactly once')
          text = text.replace(old_candidate, new_candidate, 1)

          old_route = '    if _rate_limit_marker_present(body):\n'
          new_route = (
              '    is_coderabbit = _matches_identity(\n'
              '        comment.get("user"), login=CODE_RABBIT_LOGIN, user_id=CODE_RABBIT_ID\n'
              '    ) and _matches_identity(\n'
              '        event.get("sender"), login=CODE_RABBIT_LOGIN, user_id=CODE_RABBIT_ID\n'
              '    )\n'
              '    if is_coderabbit and _rate_limit_marker_present(body):\n'
          )
          if text.count(old_route) != 1:
              raise SystemExit('trusted routing replacement expected exactly once')
          text = text.replace(old_route, new_route, 1)

          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit hardened core
        run: |
          if git diff --quiet -- .github/trust-root/scripts/reviewer_fallback.py; then
            echo 'No core changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/trust-root/scripts/reviewer_fallback.py
          git commit -m 'fix: ignore untrusted fallback inputs'
          git push origin HEAD:ci/coderabbit-qodo-fallback
